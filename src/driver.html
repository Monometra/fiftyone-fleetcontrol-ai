<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FleetControlAI - Driver Portal</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .driver-profile {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
        }
        .driver-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            box-shadow: var(--shadow-glow);
        }
        .driver-info h2 {
            font-size: 24px;
            margin-bottom: 4px;
        }
        .driver-info p {
            color: var(--text-secondary);
        }
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent-success);
            margin-right: 8px;
            box-shadow: 0 0 10px var(--accent-success);
        }
        
        .route-map-placeholder {
            height: 300px;
            border-radius: var(--radius-sm);
            background: rgba(0, 0, 0, 0.2);
            border: 1px dashed var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="nav-logo">🌌</span>
            <h1>FleetControlAI</h1>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Dashboard</a>
            <a href="admin.html" class="nav-link">Admin Center</a>
            <a href="driver.html" class="nav-link active">Driver Portal</a>
        </div>
    </nav>

    <main class="dashboard">
        <div class="driver-profile" style="animation: fadeInDown 0.6s ease-out;">
            <div class="driver-avatar">MJ</div>
            <div class="driver-info">
                <h2>Marcus Johnson</h2>
                <p><span class="status-indicator"></span>Active Shift • Vehicle FLT-8092</p>
            </div>
        </div>

        <div class="grid-2col" style="animation: fadeInUp 0.6s ease-out 0.1s both;">
            <div class="card">
                <div class="card-header">
                    <h3>Current Route Status</h3>
                    <span class="card-rubric">Real-time</span>
                </div>
                <div class="card-body">
                    <div class="route-map-placeholder">
                        Live Route Map View (V2X Sync)
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <p style="color: var(--text-secondary); font-size: 14px;">Next Stop</p>
                            <p style="font-weight: 600; font-size: 18px;">Midtown Distribution Center</p>
                        </div>
                        <div style="text-align: right;">
                            <p style="color: var(--text-secondary); font-size: 14px;">ETA</p>
                            <p style="font-weight: 600; font-size: 18px; color: var(--accent-primary);">14 mins</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3>Performance & Safety</h3>
                </div>
                <div class="card-body">
                    <div style="margin-bottom: 24px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                            <span>Safety Score</span>
                            <span style="color: var(--accent-success); font-weight: 600;">98/100</span>
                        </div>
                        <div style="width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px;">
                            <div style="width: 98%; height: 100%; background: var(--accent-success); border-radius: 4px; box-shadow: 0 0 10px var(--accent-success);"></div>
                        </div>
                    </div>
                    
                    <div style="margin-bottom: 24px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                            <span>Eco-Driving Efficiency</span>
                            <span style="color: var(--accent-primary); font-weight: 600;">92%</span>
                        </div>
                        <div style="width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px;">
                            <div style="width: 92%; height: 100%; background: var(--accent-primary); border-radius: 4px; box-shadow: 0 0 10px var(--accent-primary);"></div>
                        </div>
                    </div>

                    <div style="margin-top: 40px; text-align: center;">
                        <button class="panel-btn" style="width: 100%;">Acknowledge AI Alerts</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
